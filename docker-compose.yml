services:
  wizzgeeks-clickup-frontend:
    build:
      context: .
      args:
        # Frontend reaches the backend through the nginx /api proxy over the
        # shared network (same origin → no CORS, cookies just work).
        VITE_API_BASE_URL: /api/api/v1
    container_name: clickup-frontend
    restart: unless-stopped
    ports:
      - "7303:7303"
    networks:
      - shared-app-network

networks:
  shared-app-network:
    external: true
